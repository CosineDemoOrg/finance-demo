    <!-- Bank of Anthos Navigation Bar -->
    <header>
      <nav class="navbar navbar-expand-lg navbar-top">
        <div class="container">
        {% if cymbal_logo == "true" %}
          <div class="logo-container">
            <a href="/"><img id="cymbal-logo" src="static/img/cymbal.svg"></a>
          </div>
        {% else %}
          <a class="navbar-brand">
            {{ bank_name }}
          </a>
        {% endif %}
        {% if name %}
          <button type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler navbar-toggler-right">
            <span class="material-icons">menu</span>
          </button>
          <div class="justify-content-end collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              {% if orgs %}
              <li class="nav-item">
                <form method="POST" action="/switch-org" class="form-inline">
                  <label class="mr-2 text-muted small mb-0" for="org-select">Organization</label>
                  <select id="org-select" name="org_id" class="custom-select custom-select-sm" onchange="this.form.submit()">
                    {% for org in orgs %}
                      <option value="{{ org.org_id }}" {% if active_org_id is not none and org.org_id == active_org_id %}selected{% endif %}>
                        {{ org.org_name }}{% if org.role %} ({{ org.role }}){% endif %}
                      </option>
                    {% endfor %}
                  </select>
                </form>
              </li>
              {% endif %}
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="accountDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                  <span>
                      <span id="account-user-name">{{ name }}</span>
                  </span>
                </a>
                <div class="dropdown-menu" aria-labelledby="accountDropdown">
                  <form id="logout-form" method="POST" action="/logout">
                    <a class="dropdown-item" onclick="document.querySelector('#logout-form').submit();">Sign out<i class="fa-icon-spacer fas fa-sign-out-alt"></i></a>
                  </form>
                </div>
              </li>
            </ul>
          </div>
        {% endif %}
        </div>
      </nav>
    </header>
